        category: file_event
        product: windows

  - id: sysmon_registry_add
    type: add_condition
    conditions:
      EventID: 12
    rule_conditions:
      - type: logsource
        category: registry_add
        product: windows

  - id: sysmon_registry_delete
    type: add_condition
    conditions:
      EventID: 12
    rule_conditions:
