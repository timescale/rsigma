        category: file_block_executable
        product: windows

  - id: sysmon_file_executable_detected
    type: add_condition
    conditions:
      EventID: 29
    rule_conditions:
      - type: logsource
        category: file_executable_detected
        product: windows

  # Change logsource to sysmon service for all matched categories
  - id: sysmon_logsource
    type: change_logsource
    product: windows
    service: sysmon
    rule_conditions:
      - type: logsource
        product: windows
