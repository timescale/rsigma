# Fibratus Windows logsource pipeline.
#
# Maps Sigma's Windows logsource categories (process_creation,
# network_connection, file_event, image_load, registry_set, dns_query,
# pipe_created, create_remote_thread) to Fibratus kernel-event names
# (`evt.name = 'CreateProcess'`, `evt.name = 'Connect'`, ...) and renames
# Sigma's PascalCase fields (`Image`, `CommandLine`, `TargetFilename`,
# `TargetObject`, `DestinationIp`, ...) to the lowercase-dotted Fibratus
# vocabulary (`ps.exe`, `ps.cmdline`, `file.path`, `registry.path`,
# `net.dip`, ...).
#
# Field namespace note: Fibratus 3.0.0 decommissioned the legacy
# `ps.sibling.*` namespace and unified process attributes under `ps.*`.
# On a `CreateProcess` event `ps.exe` is the full executable path of the
# *created* (child) process and the spawning process is addressed via
# `ps.parent.*`. Cross-process targets on `OpenProcess`/`OpenThread`
# events are exposed as event arguments (`evt.arg[exe]`, `evt.arg[pid]`).
#
# Use this pipeline when converting Sigma Windows rules to Fibratus rule
# YAML so the output matches the upstream rules-library style and the
# Fibratus loader accepts the conditions without manual editing.
#
# Usage:
#   rsigma backend convert -t fibratus -p fibratus_windows rules/windows/process_creation/

name: fibratus_windows
priority: 20

transformations:
  # --- Process creation ---
  #
  # On a Fibratus 3.0.0 `CreateProcess` event `ps.*` describes the
  # *created* (child) process, matching Sigma's `process_creation.Image`
  # (the spawned process). The spawning process is addressed via the
  # `ps.parent.*` namespace.
  - id: fibratus_process_creation_fields
    type: field_name_mapping
    mapping:
      Image: ps.exe
      CommandLine: ps.cmdline
      OriginalFileName: ps.pe.file.name
      CurrentDirectory: ps.cwd
      ProcessGuid: ps.uuid
      ProcessId: ps.pid
      User: ps.username
      LogonId: ps.sessionid
      ParentImage: ps.parent.exe
      ParentCommandLine: ps.parent.cmdline
      ParentProcessId: ps.parent.pid
      ParentProcessGuid: ps.parent.uuid
      IntegrityLevel: ps.token.integrity_level
      Company: ps.pe.company
      Description: ps.pe.description
      Product: ps.pe.product
      FileVersion: process.pe.file.version
    rule_conditions:
      - type: logsource
        category: process_creation
        product: windows

  - id: fibratus_process_creation_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: CreateProcess
    rule_conditions:
      - type: logsource
        category: process_creation
        product: windows

  # --- Process termination ---
  - id: fibratus_process_termination_fields
    type: field_name_mapping
    mapping:
      Image: ps.exe
      CommandLine: ps.cmdline
      OriginalFileName: ps.pe.file.name
      CurrentDirectory: ps.cwd
      ProcessGuid: ps.uuid
      ProcessId: ps.pid
      User: ps.username
      LogonId: ps.sessionid
      ParentImage: ps.parent.exe
      ParentCommandLine: ps.parent.cmdline
      ParentProcessId: ps.parent.pid
      ParentProcessGuid: ps.parent.uuid
      IntegrityLevel: ps.token.integrity_level
      Company: ps.pe.company
      Description: ps.pe.description
      Product: ps.pe.product
      FileVersion: process.pe.file.version
    rule_conditions:
      - type: logsource
        category: process_termination
        product: windows

  - id: fibratus_process_termination_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: TerminateProcess
    rule_conditions:
      - type: logsource
        category: process_termination
        product: windows

  # --- File events (file creation) ---
  #
  # Sigma's `file_event` is a file *creation* event. Fibratus's
  # `CreateFile` kernel event covers both opens and creations, so the
  # creation case is the `create_file` macro: a `CreateFile` event whose
  # disposition is anything other than `OPEN`. The event-name predicate
  # is prepended and the `file.operation != 'OPEN'` guard is added as a
  # negated `OPEN` comparison so a Sigma `file_event` rule does not also
  # fire on plain file opens (which belong to a separate access event).
  - id: fibratus_file_event_fields
    type: field_name_mapping
    mapping:
      TargetFilename: file.path
      Image: ps.exe
      ProcessId: ps.pid
      User: ps.username
    rule_conditions:
      - type: logsource
        category: file_event
        product: windows

  - id: fibratus_file_event_condition
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: CreateFile
    rule_conditions:
      - type: logsource
        category: file_event
        product: windows

  - id: fibratus_file_event_not_open
    type: add_condition
    # Exclude the OPEN disposition so this matches file creation
    # (the `create_file` macro), not file access.
    negated: true
    conditions:
      file.operation: OPEN
    rule_conditions:
      - type: logsource
        category: file_event
        product: windows

  # --- File delete ---
  - id: fibratus_file_delete_fields
    type: field_name_mapping
    mapping:
      TargetFilename: file.path
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: file_delete
        product: windows

  - id: fibratus_file_delete_condition
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: DeleteFile
    rule_conditions:
      - type: logsource
        category: file_delete
        product: windows

  # --- Network connection ---
  - id: fibratus_network_connection_fields
    type: field_name_mapping
    mapping:
      Image: ps.exe
      ProcessId: ps.pid
      User: ps.username
      DestinationIp: net.dip
      DestinationPort: net.dport
      DestinationPortName: net.dport.name
      SourceIp: net.sip
      SourcePort: net.sport
      Protocol: net.l4.proto
    rule_conditions:
      - type: logsource
        category: network_connection
        product: windows

  - id: fibratus_network_connection_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: Connect
    rule_conditions:
      - type: logsource
        category: network_connection
        product: windows

  # --- DNS query ---
  - id: fibratus_dns_query_fields
    type: field_name_mapping
    mapping:
      QueryName: dns.name
      QueryStatus: dns.rcode
      QueryResults: dns.answers
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: dns_query
        product: windows

  - id: fibratus_dns_query_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: QueryDns
    rule_conditions:
      - type: logsource
        category: dns_query
        product: windows

  # --- Image / DLL load ---
  #
  # Fibratus 3.0.0 deprecated the `image.*` namespace in favor of
  # `module.*` for loaded executables/DLLs. `SignatureStatus`, `Hashes`,
  # and `Imphash` have no `module.*` field and are dropped (Sigma rules
  # using them under this logsource fail conversion rather than emit a
  # field the loader rejects); both `ImageLoaded` and `OriginalFileName`
  # map to `module.path`.
  - id: fibratus_image_load_fields
    type: field_name_mapping
    mapping:
      ImageLoaded: module.path
      OriginalFileName: module.path
      Image: ps.exe
      ProcessId: ps.pid
      Signed: module.signature.exists
      Signature: module.signature.subject
    rule_conditions:
      - type: logsource
        category: image_load
        product: windows

  - id: fibratus_image_load_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: LoadModule
    rule_conditions:
      - type: logsource
        category: image_load
        product: windows

  # --- Registry add/set/delete ---
  - id: fibratus_registry_event_fields
    type: field_name_mapping
    mapping:
      TargetObject: registry.path
      Details: registry.data
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: registry_event
        product: windows

  - id: fibratus_registry_set_fields
    type: field_name_mapping
    mapping:
      TargetObject: registry.path
      Details: registry.data
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: registry_set
        product: windows

  - id: fibratus_registry_set_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: RegSetValue
    rule_conditions:
      - type: logsource
        category: registry_set
        product: windows

  - id: fibratus_registry_add_fields
    type: field_name_mapping
    mapping:
      TargetObject: registry.path
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: registry_add
        product: windows

  - id: fibratus_registry_add_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: RegCreateKey
    rule_conditions:
      - type: logsource
        category: registry_add
        product: windows

  - id: fibratus_registry_delete_fields
    type: field_name_mapping
    mapping:
      TargetObject: registry.path
      Image: ps.exe
      ProcessId: ps.pid
    rule_conditions:
      - type: logsource
        category: registry_delete
        product: windows

  - id: fibratus_registry_delete_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: RegDeleteKey
    rule_conditions:
      - type: logsource
        category: registry_delete
        product: windows

  # --- Pipe created ---
  #
  # Not mapped: Fibratus has no visibility into named-pipe events
  # without a dedicated kernel driver, so there is no faithful target
  # event. Sigma `pipe_created` rules fall through unmapped (and fail
  # conversion) rather than silently aliasing to an unrelated event.

  # --- Create remote thread ---
  #
  # Fibratus does not expose a `thread.image` field for the target
  # process's executable on a CreateThread event, only `thread.pid`
  # (the cross-process pointer that `create_remote_thread` macro
  # already uses: `evt.pid != thread.pid`). Sigma rules that
  # reference `TargetImage` will fail conversion with an unsupported
  # field rather than emit a renamed field Fibratus does not know.
  - id: fibratus_create_remote_thread_fields
    type: field_name_mapping
    mapping:
      SourceImage: ps.exe
      SourceProcessId: ps.pid
      TargetProcessId: thread.pid
      TargetImage: evt.arg[exe]
      StartAddress: thread.start_address
      StartModule: thread.start_address.module
      StartFunction: thread.start_address.symbol
    rule_conditions:
      - type: logsource
        category: create_remote_thread
        product: windows

  - id: fibratus_create_remote_thread_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: CreateThread
    rule_conditions:
      - type: logsource
        category: create_remote_thread
        product: windows

  # --- Driver load ---
  #
  # Same `image.*` -> `module.*` migration as image_load; the loaded
  # driver is a module (`module.is_driver` is true). `SignatureStatus`
  # and `Hashes` have no `module.*` equivalent and are dropped.
  - id: fibratus_driver_load_fields
    type: field_name_mapping
    mapping:
      ImageLoaded: module.path
      Image: module.path
      Signed: module.signature.exists
      Signature: module.signature.subject
    rule_conditions:
      - type: logsource
        category: driver_load
        product: windows

  - id: fibratus_driver_load_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: LoadModule
    rule_conditions:
      - type: logsource
        category: driver_load
        product: windows

  # --- Process access ---
  #
  # On an `OpenProcess` event the caller is the generating process
  # (`ps.*`) and the process being opened is exposed through event
  # arguments. The upstream 3.0.0 LSASS-access rule tests the target
  # with `evt.arg[exe] imatches '?:\Windows\System32\lsass.exe'`, so
  # `TargetImage`/`TargetProcessId` map to `evt.arg[exe]`/`evt.arg[pid]`.
  # `GrantedAccess` maps to `ps.access.mask.names`, the human-readable
  # slice of access-right names that Sigma rules typically test against
  # (`ps.access.mask` exposes the raw mask value if needed).
  - id: fibratus_process_access_fields
    type: field_name_mapping
    mapping:
      SourceImage: ps.exe
      SourceProcessId: ps.pid
      TargetImage: evt.arg[exe]
      TargetProcessId: evt.arg[pid]
      GrantedAccess: ps.access.mask.names
    rule_conditions:
      - type: logsource
        category: process_access
        product: windows

  - id: fibratus_process_access_event
    type: add_condition
    # Put the event-name discriminator first so Fibratus's
    # left-to-right evaluation short-circuits on the cheapest, most
    # selective predicate before the rule body.
    prepend: true
    conditions:
      evt.name: OpenProcess
    rule_conditions:
      - type: logsource
        category: process_access
        product: windows

  # --- Logsource finalizer: tag matched rules with service=fibratus ---
  - id: fibratus_logsource_tag
    type: change_logsource
    product: windows
    service: fibratus
    rule_conditions:
      - type: logsource
        product: windows
