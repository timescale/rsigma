# Local TAXII live harness: Wiremock + Caddy (TLS) + CoreDNS (SRV).
# See README.md in this directory.

services:
  wiremock:
    image: wiremock/wiremock:3.13.2
    volumes:
      - ./mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__admin/health"]
      interval: 2s
      timeout: 3s
      retries: 15

  caddy:
    image: caddy:2.10.0-alpine
    depends_on:
      wiremock:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "8444:8444"
      - "8445:8445"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./fixtures/certs:/certs:ro

  coredns:
    image: coredns/coredns:1.12.0
    command: -conf /etc/coredns/Corefile
    restart: on-failure
    ports:
      - "127.0.0.1:5353:53/udp"
      - "127.0.0.1:5353:53/tcp"
    volumes:
      - ./coredns:/etc/coredns:ro
