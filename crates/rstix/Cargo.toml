[package]
name = "rstix"
description = "STIX 2.1 + TAXII 2.1 library for Rust"
readme = "README.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
default = ["serde"]

serde = ["dep:serde"]
pattern = ["dep:base64", "dep:ipnet", "dep:regex", "dep:unicode-normalization"]
validate = ["serde", "pattern"]

[dependencies]
phf = { version = "0.14", features = ["macros"] }
serde_jcs = "0.2"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "parsing"] }
uuid = { version = "1", features = ["v4", "v5"] }

serde = { version = "1", features = ["derive"], optional = true }
serde_json = "1"
base64 = { version = "0.22", optional = true }
ipnet = { version = "2", optional = true }
regex = { version = "1", optional = true }
unicode-normalization = { version = "0.1", optional = true }

[[test]]
name = "pattern_parse"
required-features = ["pattern"]

[[test]]
name = "pattern_eval"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_spec_eval"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_eval_operators"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_eval_sco_fields"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_eval_errors"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_eval_security"
required-features = ["pattern", "serde"]

[[test]]
name = "pattern_indicator"
required-features = ["pattern", "serde"]

[[test]]
name = "validate_pipeline"
required-features = ["validate"]
