strict: true
site_name: RSigma
site_description: A complete Rust toolkit for the Sigma detection standard. Parser, evaluator, rule conversion, streaming daemon, linter, and LSP.
site_url: https://timescale.github.io/rsigma/
site_author: Mostafa Moradian
copyright: Copyright &copy; 2026 Tiger Data. Licensed under MIT.

repo_name: timescale/rsigma
repo_url: https://github.com/timescale/rsigma
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

theme:
  name: material
  language: en
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - navigation.expand
    - navigation.footer
    - navigation.sections
    - navigation.tracking
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    annotation: material/arrow-right-circle
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/timescale/rsigma
      name: RSigma on GitHub
    - icon: fontawesome/brands/docker
      link: https://ghcr.io/timescale/rsigma
      name: RSigma on GHCR
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/rsigma
      name: RSigma on crates.io
  generator: false

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: 🔗
      toc_depth: 3
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink:
      repo_url_shorthand: true
      normalize_issue_symbols: true
      provider: github
      user: timescale
      repo: rsigma
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
        - docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - awesome-pages
  - section-index
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
      enabled: !ENV [CI, false]
      fallback_to_build_date: true
  - git-committers:
      repository: timescale/rsigma
      branch: main
      enabled: !ENV [CI, false]
  - include-markdown:
      preserve_includer_indent: true
      dedent: false
      trailing_newlines: true
      comments: false
  - macros:
      include_yaml:
        - docs/_data/vars.yml
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - rss:
      match_path: "release-notes\\.md|guide/.*|getting-started/.*"
      date_from_meta:
        as_creation: date
        as_update: git
      categories:
        - tags
  - table-reader
  - llmstxt:
      markdown_description: |
        RSigma is a complete Rust toolkit for the Sigma detection standard,
        including a parser, evaluation engine, rule conversion, streaming
        runtime, linter, CLI, and LSP server.
      sections:
        Getting Started:
          - index.md
          - getting-started/installation.md
          - getting-started/quick-start.md
          - getting-started/concepts.md
        User Guide:
          - guide/evaluating-rules.md
          - guide/streaming-detection.md
          - guide/rule-conversion.md
          - guide/linting-rules.md
          - guide/processing-pipelines.md
          - guide/input-formats.md
          - guide/nats-streaming.md
          - guide/otlp-integration.md
          - guide/ci-cd.md
          - guide/performance-tuning.md
          - guide/observability.md
        CLI Reference:
          - cli/index.md
          - cli/engine/eval.md
          - cli/engine/daemon.md
          - cli/rule/parse.md
          - cli/rule/validate.md
          - cli/rule/lint.md
          - cli/rule/fields.md
          - cli/rule/condition.md
          - cli/rule/stdin.md
          - cli/backend/convert.md
          - cli/backend/targets.md
          - cli/backend/formats.md
          - cli/pipeline/resolve.md
        Library:
          - library/index.md
          - library/parser.md
          - library/eval.md
          - library/convert.md
          - library/runtime.md
        Developers:
          - developers/index.md
          - developers/architecture.md
          - developers/contributing.md
          - developers/testing.md
          - developers/fuzzing.md
          - developers/benchmarks.md
          - developers/adding-backends.md
          - developers/adding-input-formats.md
          - developers/linter-and-lsp.md
        Reference:
          - reference/lint-rules.md
          - reference/backends/postgres.md
          - reference/backends/lynxdb.md
          - reference/metrics.md
          - reference/http-api.md
          - reference/exit-codes.md
          - reference/environment-variables.md
          - reference/feature-flags.md
          - reference/custom-attributes.md
          - reference/builtin-pipelines.md
          - reference/dynamic-sources.md
          - reference/security.md
          - reference/architecture.md
        Deployment:
          - deployment/docker.md
          - deployment/kubernetes.md
        Editors:
          - editors/vscode.md
          - editors/neovim.md
        Ecosystem:
          - ecosystem/helr.md
  - redirects:
      redirect_maps: {}
