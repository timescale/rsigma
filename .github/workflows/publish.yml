name: Publish to crates.io

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    environment:
      name: crates.io
      url: https://crates.io/crates/rsigma-parser

    permissions:
      id-token: write # for trusted publishing to crates.io

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup override set stable

      # No build cache here: rust-cache on a publish workflow exposes the
      # signed crate artifacts to a cache-poisoning vector (a malicious PR
      # that lands earlier could seed a tampered build cache). Publishing
      # happens once per release, so the cache miss is acceptable.

      # Pre-flight: dry-run only the crate that has no unpublished
      # workspace dependencies. `cargo publish --dry-run` resolves every
      # path dependency's version against the live crates.io index, so a
      # dependent crate (e.g. rsigma-eval, which requires
      # `rsigma-parser = "0.14.0"`) cannot be dry-run until its sibling's
      # new version already exists on the registry. Dry-running
      # rsigma-parser still smoke-tests packaging, the manifest, and
      # lockfile state before any side-effecting upload; the dependent
      # crates are validated by the sequential `--locked` publish below,
      # each of which runs only after the crate it depends on has landed
      # in the index.
      - name: Pre-flight dry-run (rsigma-parser)
        run: cargo publish --dry-run --locked -p rsigma-parser

      # rstix has no workspace dependencies, so its packaging can also be
      # dry-run before any upload for an extra pre-flight smoke test.
      - name: Pre-flight dry-run (rstix)
        run: cargo publish --dry-run --locked -p rstix

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      # `workflow_dispatch` runs every publish step in dry-run mode for
      # an end-to-end rehearsal without touching crates.io; the actual
      # release event runs the real publish.
      - name: Publish rsigma-parser
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-parser
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # Wait for the published version to appear in the registry index
      # before the next crate attempts to resolve it as a dependency.
      - name: Wait for crates.io index update (rsigma-parser)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      # rsigma-ir depends only on rsigma-parser, so it publishes right after
      # it and before rsigma-eval and rsigma-convert, which both depend on it.
      - name: Publish rsigma-ir
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-ir
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update (rsigma-ir)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      - name: Publish rsigma-eval
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-eval
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update (rsigma-eval)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      - name: Publish rsigma-convert
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-convert
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update (rsigma-convert)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      - name: Publish rsigma-runtime
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update (rsigma-runtime)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      - name: Publish rsigma-mcp
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update (rsigma-mcp)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30

      - name: Publish rsigma
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish rsigma-lsp
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rsigma-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # rstix stands alone: no workspace crate depends on it and it depends
      # on no workspace crate, so no index-wait step is required afterward.
      - name: Publish rstix
        if: github.event_name != 'workflow_dispatch'
        run: ./ci/publish-crate.sh rstix
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
