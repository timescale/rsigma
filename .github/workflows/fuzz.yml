name: Fuzz

on:
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: "Seconds per fuzz target"
        required: false
        default: "180"

permissions: {}

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repo
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fuzz_parse_yaml
            max_len: 8192
          - target: fuzz_condition
            max_len: 512
          - target: fuzz_eval_matching
            max_len: 65536
          - target: fuzz_field_modifiers
            max_len: 256
          - target: fuzz_regex_compile
            max_len: 1024
          - target: fuzz_pipeline_yaml
            max_len: 4096
          - target: fuzz_input_formats
            max_len: 4096
          - target: fuzz_pipeline_sources_yaml
            max_len: 8192
          - target: fuzz_alert_pipeline_config
            max_len: 4096
          - target: fuzz_extract_jq
            max_len: 4096
          - target: fuzz_extract_jsonpath
            max_len: 4096
          - target: fuzz_extract_cel
            max_len: 4096
          - target: fuzz_template_expand
            max_len: 4096
          - target: fuzz_include_parse
            max_len: 8192
          - target: fuzz_http_response
            max_len: 65536
          - target: fuzz_rstix_parse_bundle
            max_len: 65536
          - target: fuzz_rstix_validate_json
            max_len: 65536
          - target: fuzz_stix_pattern
            max_len: 4096
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal --component llvm-tools-preview
          rustup default nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz -> target

      - name: Install cargo-fuzz
        # Build cargo-fuzz with the nightly toolchain explicitly. The repo's
        # rust-toolchain.toml pins ambient `cargo` to the MSRV, which is too
        # old to compile recent cargo-fuzz dependencies, so select nightly with
        # `+nightly` to match the toolchain used for the fuzz run below.
        run: cargo +nightly install cargo-fuzz --locked

      - name: Restore corpus cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer
        working-directory: fuzz
        env:
          FUZZ_TARGET: ${{ matrix.target }}
          FUZZ_MAX_LEN: ${{ matrix.max_len }}
          FUZZ_DURATION: ${{ github.event.inputs.duration || '180' }}
        run: |
          mkdir -p "corpus/${FUZZ_TARGET}"
          cargo +nightly fuzz run "${FUZZ_TARGET}" \
            "corpus/${FUZZ_TARGET}" "seeds/${FUZZ_TARGET}" -- \
            -max_total_time="${FUZZ_DURATION}" \
            -timeout=10 \
            -max_len="${FUZZ_MAX_LEN}"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
