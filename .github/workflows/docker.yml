name: Docker image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag, branch, or SHA) to build. Defaults to the branch the run is dispatched from."
        required: false
        type: string
        default: ""
      version:
        description: "Semver to publish on a manual run, e.g. 0.14.0. Tags {{version}}, {{major}}.{{minor}}, and latest. Leave empty for release-triggered runs."
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-22.04-arm
            platform: linux/arm64

    permissions:
      contents: read # checkout
      packages: write # push image by digest to GHCR

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          sbom: true
          provenance: mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${BUILD_DIGEST}"
          touch "/tmp/digests/${digest#sha256:}"
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  scan:
    name: Vulnerability scan (${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    permissions:
      contents: read # checkout (implicit)
      packages: read # pull image for scanning
      security-events: write # upload SARIF results

    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ${{ matrix.arch }} digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests

      - name: Resolve digest
        id: resolve
        run: echo "digest=sha256:$(ls /tmp/digests)" >> "${GITHUB_OUTPUT}"

      - uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.resolve.outputs.digest }}
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
        env:
          # Each digest is a single-platform OCI index; the scan runner is amd64,
          # so pin grype to the matrix arch instead of the host default.
          GRYPE_PLATFORM: linux/${{ matrix.arch }}

      - uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: docker-${{ matrix.arch }}

  push:
    name: Create manifest and sign
    needs: [build, scan]
    runs-on: ubuntu-latest

    permissions:
      contents: read # checkout (implicit)
      packages: write # push multi-arch manifest to GHCR
      id-token: write # cosign keyless signing via Sigstore OIDC
      attestations: write # SLSA provenance attestation

    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Derive minor tag for manual run
        id: manual
        if: inputs.version != ''
        run: echo "minor=${INPUT_VERSION%.*}" >> "${GITHUB_OUTPUT}"
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # semver tags cover release events; raw tags cover manual workflow_dispatch runs.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.manual.outputs.minor }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.title=rsigma
            org.opencontainers.image.description=Sigma detection toolkit: parser, evaluator, converter, streaming daemon
            org.opencontainers.image.licenses=MIT

      - name: Create multi-arch manifest
        id: manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "${META_JSON}") \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)

          digest=$(docker buildx imagetools inspect \
            "$(jq -cr '.tags[0]' <<< "${META_JSON}")" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
        env:
          META_JSON: ${{ steps.meta.outputs.json }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${MANIFEST_DIGEST}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          MANIFEST_DIGEST: ${{ steps.manifest.outputs.digest }}
