  <path d="M186,330 L208,330" fill="none" stroke="#808080" stroke-dasharray="4 4" marker-end="url(#arrowg)"/>
  <text x="60" y="322" font-size="10.5" fill="#4d4d4d">resolve ${source.*}</text>
  <!-- log events -> runtime -->
  <path d="M186,544 L208,544" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="92" y="536" font-size="10.5" fill="#4d4d4d">ingest</text>

