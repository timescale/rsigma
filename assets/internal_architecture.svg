  <text x="935" y="719" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Editors</text>
  <text x="935" y="737" font-size="10.5" text-anchor="middle" fill="#4d4d4d">VS Code &#183; Neovim &#183; Helix &#183; Zed</text>
  <text x="935" y="752" font-size="10" text-anchor="middle" fill="#808080">real-time diagnostics + actions</text>

  <!-- ===================== rsigma-cli bar ===================== -->
  <rect x="210" y="776" width="850" height="28" rx="3" fill="#e6e6e6" stroke="#808080"/>
  <text x="224" y="794" font-size="11" fill="#4d4d4d"><tspan font-weight="bold">rsigma-cli</tspan>  wires every crate into the rsigma binary:  engine eval  &#183;  engine daemon  &#183;  backend convert  &#183;  rule / pipeline subcommands</text>

  <!-- ===================== legend ===================== -->
  <text x="24" y="729" font-size="11" fill="#4d4d4d">*  feature-gated</text>
  <text x="24" y="746" font-size="11" fill="#4d4d4d">**  requires the daachorse-index feature</text>
  <text x="24" y="769" font-size="10.5" fill="#808080">Dependency direction: rsigma-parser has no internal deps; eval / convert / lsp depend on parser; runtime depends on parser + eval; mcp wraps parser + eval + convert + runtime; cli depends on all.</text>
</svg>
