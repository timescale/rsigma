  <rect x="210" y="698" width="270" height="62" rx="3" fill="#ffffff" stroke="#4d4d4d"/>
  <text x="345" y="719" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">EvaluationResult</text>
  <text x="345" y="737" font-size="10.5" text-anchor="middle" fill="#4d4d4d">RuleHeader + Detection / Correlation</text>
