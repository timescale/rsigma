<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1120" height="810" viewBox="0 0 1120 810" font-family="Helvetica, Arial, sans-serif">
  <defs>
