  <rect x="30" y="527" width="152" height="59" fill="#e6f2ff" stroke="none"/>
  <text x="106" y="544" font-size="10" text-anchor="middle" fill="#4d4d4d">JSON &#183; syslog</text>
  <text x="106" y="559" font-size="10" text-anchor="middle" fill="#4d4d4d">CEF* &#183; EVTX* &#183; OTLP*</text>
