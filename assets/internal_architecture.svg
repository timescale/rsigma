  <text x="80" y="30" font-size="13" fill="#4d4d4d">internal architecture &#183; crate map &amp; execution shapes</text>

  <!-- ===================== EDGES ===================== -->
  <!-- Sigma YAML -> parser -->
  <path d="M660,96 L660,118" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
