  <path d="M660,232 L660,242 L345,242 L345,248" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <path d="M660,232 L660,248" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <path d="M660,242 L935,242 L935,248" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="350" y="238" font-size="10.5" fill="#808080">AST</text>
  <text x="912" y="238" font-size="10.5" fill="#808080">AST</text>

