  <text x="228" y="492" font-size="14" font-weight="bold" fill="#1a1a1a">rsigma-runtime</text>
  <text x="228" y="513" font-size="10.5" fill="#4d4d4d">input/: JSON &#183; syslog &#183; logfmt*</text>
  <text x="240" y="529" font-size="10" fill="#808080">CEF* &#183; EVTX* &#183; OTLP* &#183; auto-detect</text>
  <text x="228" y="547" font-size="10.5" fill="#4d4d4d">sources/: SourceResolver &#183; cache</text>
  <text x="240" y="563" font-size="10" fill="#808080">RefreshScheduler &#183; TemplateExpander</text>
  <text x="228" y="581" font-size="10.5" fill="#4d4d4d">LogProcessor: batch &#183; ArcSwap reload</text>
  <text x="228" y="599" font-size="10.5" fill="#4d4d4d">RuntimeEngine: Engine + Correlation</text>
  <text x="228" y="617" font-size="10.5" fill="#4d4d4d">enrichment/: template &#183; lookup</text>
  <text x="240" y="633" font-size="10" fill="#808080">http &#183; command</text>
  <text x="228" y="651" font-size="10.5" fill="#4d4d4d">io/: EventSource &#183; Sink &#183; DLQ &#183; TLS*</text>

  <!-- ===================== rsigma-mcp ===================== -->
  <path d="M186,150 L208,150" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>

  <rect x="26" y="110" width="160" height="80" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="106" y="132" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AI agents</text>
  <rect x="30" y="140" width="152" height="46" fill="#e6f2ff" stroke="none"/>
  <text x="106" y="158" font-size="10" text-anchor="middle" fill="#4d4d4d">Cursor &#183; Claude Code</text>
  <text x="106" y="173" font-size="10" text-anchor="middle" fill="#808080">remote agents (JSON-RPC)</text>

  <rect x="210" y="48" width="270" height="180" rx="8" fill="#ffeccf" stroke="#b3873a" stroke-dasharray="4 4"/>
  <text x="228" y="72" font-size="14" font-weight="bold" fill="#1a1a1a">rsigma-mcp</text>
  <text x="228" y="93" font-size="10.5" fill="#4d4d4d">RsigmaMcp handler (agent tool surface)</text>
  <text x="228" y="111" font-size="10.5" fill="#4d4d4d">driven by: rsigma mcp serve</text>
  <text x="228" y="129" font-size="10.5" fill="#4d4d4d">transports: stdio &#183; Streamable HTTP*</text>
  <text x="240" y="145" font-size="10" fill="#808080">bearer auth &#183; TLS</text>
  <text x="228" y="163" font-size="10.5" fill="#4d4d4d">11 tools: parse &#183; lint &#183; fix &#183; validate</text>
  <text x="240" y="179" font-size="10" fill="#808080">evaluate &#183; convert &#183; fields &#183; pipelines</text>
  <text x="228" y="197" font-size="10.5" fill="#4d4d4d">3 resources: catalogue &#183; modifiers &#183; MITRE</text>
  <text x="228" y="217" font-size="10" fill="#808080">wraps parser &#183; eval &#183; convert &#183; runtime</text>

