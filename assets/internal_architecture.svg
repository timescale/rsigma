  <text x="352" y="446" font-size="10.5" fill="#4d4d4d">embeds Engine + CorrelationEngine</text>
  <!-- runtime -> results -->
  <path d="M345,672 L345,698" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <!-- convert -> queries -->
  <path d="M640,412 L640,698" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="646" y="560" font-size="10.5" fill="#4d4d4d">backend convert</text>
