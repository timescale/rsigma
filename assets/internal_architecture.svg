  <text x="538" y="296" font-size="10.5" fill="#4d4d4d">Backend trait (pluggable)</text>
  <text x="538" y="318" font-size="10.5" fill="#4d4d4d">TextQueryConfig (~90 fields)</text>
  <text x="538" y="340" font-size="10.5" fill="#4d4d4d">condition walker &#183; deferred exprs</text>
  <text x="538" y="362" font-size="10.5" fill="#4d4d4d">backends/:</text>
