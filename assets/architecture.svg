<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="980" height="600" viewBox="0 0 980 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4d4d4d"/>
    </marker>
    <marker id="arrowg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#808080"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="600" fill="#ffffff"/>

  <!-- title -->
  <text x="22" y="26" font-size="16" font-weight="bold" fill="#1a1a1a">rsigma</text>
  <text x="78" y="26" font-size="13" fill="#4d4d4d">streaming detection architecture</text>

  <!-- ===================== EDGES (drawn first, under boxes) ===================== -->
  <!-- Sigma rules -> Parser -->
  <path d="M253,104 L300,104 L300,224 L348,224" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="304" y="160" font-size="11" fill="#4d4d4d">load + compile</text>
  <!-- Pipelines -> Parser -->
  <path d="M245,231 L322,231 L322,256 L348,256" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="246" y="222" font-size="11" fill="#4d4d4d">transform</text>
  <!-- Log events -> Runtime -->
  <path d="M253,338 L312,338 L312,341 L348,341" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="258" y="330" font-size="11" fill="#4d4d4d">ingest</text>

  <!-- Dynamic sources -> group -->
  <path d="M495,136 L495,166" fill="none" stroke="#808080" stroke-dasharray="4 4" marker-end="url(#arrowg)"/>
  <text x="502" y="156" font-size="11" fill="#4d4d4d">resolve ${source.*}</text>

  <!-- internal: parser -> eval -->
  <path d="M475,241 L488,241" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <!-- parser -> runtime -->
  <path d="M412,276 L412,298" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <!-- eval -> runtime -->
  <path d="M550,276 L550,298" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>

  <!-- runtime <-> correlation state -->
  <path d="M480,384 L480,418" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <path d="M468,418 L468,386" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="494" y="408" font-size="11" fill="#4d4d4d">windows &#183; suppression</text>

  <!-- group -> operator surface -->
  <path d="M630,198 L700,198 L700,92 L733,92" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="652" y="190" font-size="11" fill="#4d4d4d">metrics + control</text>
  <!-- runtime -> enrichment -->
  <path d="M610,341 L690,341 L690,194 L733,194" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="636" y="333" font-size="11" fill="#4d4d4d">results</text>
  <!-- enrichment -> alert pipeline -->
  <path d="M837,230 L837,248" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="843" y="244" font-size="11" fill="#4d4d4d">enriched</text>
  <!-- alert pipeline -> sinks -->
  <path d="M837,322 L837,344" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="843" y="338" font-size="11" fill="#4d4d4d">alerted</text>
  <!-- sinks -> downstream -->
  <path d="M837,430 L837,468" fill="none" stroke="#4d4d4d" marker-end="url(#arrow)"/>
  <text x="843" y="454" font-size="11" fill="#4d4d4d">forward</text>

  <!-- ===================== rsigma group ===================== -->
  <rect x="330" y="166" width="300" height="234" rx="10" fill="#ffeccf" stroke="#b3873a" stroke-dasharray="4 4"/>
  <text x="348" y="190" font-size="14" font-weight="bold" fill="#1a1a1a">rsigma engine</text>

  <!-- Parser -->
  <rect x="350" y="206" width="125" height="70" rx="3" fill="#ffffff" stroke="#4d4d4d"/>
  <text x="412" y="227" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Parser</text>
  <text x="412" y="244" font-size="10.5" text-anchor="middle" fill="#4d4d4d">YAML &#8594; AST</text>
  <text x="412" y="259" font-size="10.5" text-anchor="middle" fill="#808080">pest + Pratt</text>

  <!-- Eval -->
  <rect x="490" y="206" width="120" height="70" rx="3" fill="#ffffff" stroke="#4d4d4d"/>
  <text x="550" y="227" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Eval engine</text>
  <text x="550" y="244" font-size="10.5" text-anchor="middle" fill="#4d4d4d">lower &#8594; HIR &#8594; compile</text>
  <text x="550" y="259" font-size="10.5" text-anchor="middle" fill="#808080">match &#183; matcher optimizer</text>

  <!-- Runtime -->
  <rect x="350" y="300" width="260" height="82" rx="3" fill="#ffffff" stroke="#4d4d4d"/>
  <text x="480" y="321" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Runtime</text>
  <text x="480" y="339" font-size="10.5" text-anchor="middle" fill="#4d4d4d">LogProcessor &#183; batch evaluation</text>
  <text x="480" y="354" font-size="10.5" text-anchor="middle" fill="#4d4d4d">ArcSwap hot-reload &#183; correlation</text>
  <text x="480" y="369" font-size="10.5" text-anchor="middle" fill="#808080">stdin &#183; HTTP &#183; NATS &#183; OTLP* &#183; unix* sources</text>

  <!-- ===================== correlation state (storage region) ===================== -->
  <rect x="330" y="418" width="300" height="74" rx="4" fill="#e6e6e6" stroke="#808080"/>
  <text x="345" y="437" font-size="12" font-weight="bold" fill="#1a1a1a">Correlation state</text>
  <!-- cylinder -->
  <path d="M361,452 a17,5 0 0 1 34,0 l0,22 a17,5 0 0 1 -34,0 Z" fill="#d4d4d4" stroke="#808080"/>
  <ellipse cx="378" cy="452" rx="17" ry="5" fill="#efefef" stroke="#808080"/>
  <!-- dark store box -->
  <rect x="452" y="450" width="168" height="32" rx="3" fill="#575757"/>
  <text x="536" y="470" font-size="11" text-anchor="middle" fill="#ffffff">in-mem &#183; SQLite (--state-db)</text>

  <!-- ===================== dynamic sources (top, blue) ===================== -->
  <rect x="370" y="40" width="250" height="96" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="495" y="57" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Dynamic sources</text>
  <rect x="375" y="64" width="240" height="67" fill="#e6f2ff" stroke="none"/>
  <text x="388" y="80" font-size="10.5" fill="#4d4d4d">&#8226; HTTP API &#183; command &#183; file &#183; NATS</text>
  <text x="388" y="96" font-size="10.5" fill="#4d4d4d">&#8226; threat-intel feeds &#183; allow / deny lists</text>
  <text x="388" y="112" font-size="10.5" fill="#4d4d4d">&#8226; jq &#183; JSONPath &#183; CEL extraction</text>
  <text x="388" y="126" font-size="10.5" fill="#808080">&#8226; cache (TTL) &#183; interval / watch / push refresh</text>

  <!-- ===================== left inputs ===================== -->
  <!-- Sigma rules (stacked) -->
  <rect x="48" y="64" width="205" height="78" rx="3" fill="#cfe3fb" stroke="#4d4d4d"/>
  <rect x="44" y="68" width="205" height="78" rx="3" fill="#dcebfc" stroke="#4d4d4d"/>
  <rect x="40" y="70" width="205" height="78" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="142" y="89" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sigma rules (.yml)</text>
  <rect x="44" y="96" width="197" height="48" fill="#e6f2ff" stroke="none"/>
  <text x="142" y="115" font-size="10.5" text-anchor="middle" fill="#4d4d4d">detection &#183; correlation</text>
  <text x="142" y="131" font-size="10.5" text-anchor="middle" fill="#4d4d4d">filter rules &#183; collections</text>

  <!-- Pipelines -->
  <rect x="40" y="200" width="205" height="62" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="142" y="219" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Processing pipelines</text>
  <rect x="44" y="226" width="197" height="32" fill="#e6f2ff" stroke="none"/>
  <text x="142" y="246" font-size="10.5" text-anchor="middle" fill="#4d4d4d">ecs_windows &#183; sysmon &#183; custom</text>

  <!-- Log events (stacked) -->
  <rect x="48" y="294" width="205" height="92" rx="3" fill="#cfe3fb" stroke="#4d4d4d"/>
  <rect x="44" y="298" width="205" height="92" rx="3" fill="#dcebfc" stroke="#4d4d4d"/>
  <rect x="40" y="300" width="205" height="92" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="142" y="319" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Log events</text>
  <rect x="44" y="326" width="197" height="62" fill="#e6f2ff" stroke="none"/>
  <text x="142" y="344" font-size="10.5" text-anchor="middle" fill="#4d4d4d">JSON &#183; syslog &#183; logfmt*</text>
  <text x="142" y="360" font-size="10.5" text-anchor="middle" fill="#4d4d4d">CEF* &#183; EVTX* &#183; OTLP*</text>
  <text x="142" y="376" font-size="10.5" text-anchor="middle" fill="#808080">plain text &#183; auto-detect</text>

  <!-- ===================== right outputs ===================== -->
  <!-- Operator surface -->
  <rect x="735" y="46" width="205" height="92" rx="3" fill="#fff3e6" stroke="#4d4d4d"/>
  <text x="837" y="66" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Operator surface</text>
  <text x="752" y="86" font-size="10.5" fill="#4d4d4d">&#8226; /metrics (Prometheus)</text>
  <text x="752" y="102" font-size="10.5" fill="#4d4d4d">&#8226; /api/v1 control &#183; reload</text>
  <text x="752" y="118" font-size="10.5" fill="#4d4d4d">&#8226; health probes</text>
  <text x="752" y="132" font-size="10.5" fill="#808080">&#8226; TLS* termination (mTLS)</text>

  <!-- Enrichment -->
  <rect x="735" y="158" width="205" height="72" rx="3" fill="#fff3e6" stroke="#4d4d4d"/>
  <text x="837" y="178" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Enrichment</text>
  <text x="837" y="196" font-size="10.5" text-anchor="middle" fill="#4d4d4d">asset &#183; GeoIP &#183; KEV</text>
  <text x="837" y="211" font-size="10.5" text-anchor="middle" fill="#4d4d4d">reputation &#183; runbook</text>
  <text x="837" y="226" font-size="10.5" text-anchor="middle" fill="#808080">template &#183; lookup &#183; http &#183; command</text>

  <!-- Alert pipeline + risk (post-engine, opt-in) -->
  <rect x="735" y="248" width="205" height="74" rx="3" fill="#fff3e6" stroke="#4d4d4d"/>
  <text x="837" y="268" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Alert pipeline + risk</text>
  <text x="837" y="286" font-size="10.5" text-anchor="middle" fill="#4d4d4d">dedup &#183; silence &#183; inhibit</text>
  <text x="837" y="301" font-size="10.5" text-anchor="middle" fill="#4d4d4d">incidents &#183; risk scoring</text>
  <text x="837" y="316" font-size="10.5" text-anchor="middle" fill="#808080">opt-in &#183; post-engine</text>

  <!-- Sinks (stacked) -->
  <rect x="743" y="340" width="205" height="100" rx="3" fill="#ededed" stroke="#4d4d4d"/>
  <rect x="739" y="344" width="205" height="100" rx="3" fill="#f6f6f6" stroke="#4d4d4d"/>
  <rect x="735" y="346" width="205" height="100" rx="3" fill="#ffffff" stroke="#4d4d4d"/>
  <text x="837" y="367" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sinks</text>
  <text x="837" y="384" font-size="10.5" text-anchor="middle" fill="#4d4d4d">stdout &#183; file &#183; NATS</text>
  <text x="837" y="399" font-size="10.5" text-anchor="middle" fill="#4d4d4d">OTLP* &#183; webhook &#183; unix*</text>
  <text x="837" y="414" font-size="10.5" text-anchor="middle" fill="#4d4d4d">DLQ (failed events)</text>
  <text x="837" y="429" font-size="10.5" text-anchor="middle" fill="#808080">one flat JSON object per result</text>

  <!-- Downstream -->
  <rect x="735" y="470" width="205" height="80" rx="3" fill="#ffffff" stroke="#808080"/>
  <text x="837" y="491" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Downstream</text>
  <text x="837" y="510" font-size="10.5" text-anchor="middle" fill="#4d4d4d">SIEM &#183; SOAR &#183; Grafana</text>
  <text x="837" y="526" font-size="10.5" text-anchor="middle" fill="#4d4d4d">object store &#183; alerting</text>
  <text x="837" y="542" font-size="10.5" text-anchor="middle" fill="#808080">Prometheus scrape /metrics</text>

  <!-- ===================== AI agents (MCP) ===================== -->
  <path d="M245,470 L302,470 L302,392 L330,392" fill="none" stroke="#808080" stroke-dasharray="4 4" marker-end="url(#arrowg)"/>
  <text x="250" y="464" font-size="11" fill="#4d4d4d">tools over MCP</text>

  <rect x="40" y="428" width="205" height="112" rx="3" fill="#99ccff" stroke="#4d4d4d"/>
  <text x="142" y="447" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AI agents (MCP)</text>
  <rect x="44" y="454" width="197" height="82" fill="#e6f2ff" stroke="none"/>
  <text x="142" y="471" font-size="10.5" text-anchor="middle" fill="#4d4d4d">via rsigma mcp serve</text>
  <text x="142" y="489" font-size="10.5" text-anchor="middle" fill="#4d4d4d">parse &#183; lint &#183; fix &#183; validate</text>
  <text x="142" y="505" font-size="10.5" text-anchor="middle" fill="#4d4d4d">evaluate &#183; convert &#183; fields</text>
  <text x="142" y="523" font-size="10.5" text-anchor="middle" fill="#808080">stdio &#183; HTTP* (bearer &#183; TLS)</text>

  <!-- ===================== legend ===================== -->
  <text x="22" y="566" font-size="11" fill="#4d4d4d">*  feature-gated</text>
  <text x="22" y="582" font-size="11" fill="#808080">The runtime wraps the stateless Engine; rules lower to a shared HIR (rsigma-ir) before compile. It powers the CLI, library, and rsigma-mcp (see internal_architecture.svg).</text>
</svg>
